syntax = "proto3";

package proto;

option go_package = "./";

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginResp {
  string msg = 1;
  int64 code = 2;
}

message GoodsAddReq {
  string name = 1;
  float price = 2;
  string images = 3;
  string bio = 4;
  int64 stock = 5;
}

message GoodsAddResp {
  string msg = 1;
  int64 code = 2;
}

message GoodsDetailReq {
  int64 goodsId = 1;
}

message GoodsDetailResp {
  string msg = 1;
  int64 code = 2;
  repeated GoodsDetail list = 3;
}

message GoodsDetail {
  string name = 1;
  float price = 2;
  string images = 3;
  string bio = 4;
  int64 stock = 5;
  int64 status = 6;
}

service Goods {
  rpc Login(LoginReq) returns (LoginResp);
  rpc GoodsAdd(GoodsAddReq) returns (GoodsAddResp);
  rpc GoodsDetail(GoodsDetailReq) returns (GoodsDetailResp);
}